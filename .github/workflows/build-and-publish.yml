name: Build, Obfuscate & Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g., 1.0.0)'
        required: false
        type: string

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  # ==========================================================================
  # macOS Build (Native Clang with obfuscation)
  # ==========================================================================
  build-macos:
    runs-on: macos-14  # Apple Silicon
    strategy:
      matrix:
        arch: [arm64]  # Can add x64 for Intel Macs
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install libsodium cmake

      - name: Build Client (macOS ${{ matrix.arch }})
        run: |
          mkdir -p build-client && cd build-client
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_CLIENT=ON \
            -DBUILD_SERVER=OFF \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_DOTNET_INTEROP=ON \
            -DENABLE_HARDENING=ON \
            -DBUILD_TESTS=OFF
          cmake --build . --config Release -j$(sysctl -n hw.ncpu)

      - name: Build Server (macOS ${{ matrix.arch }})
        run: |
          mkdir -p build-server && cd build-server
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_CLIENT=OFF \
            -DBUILD_SERVER=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_DOTNET_INTEROP=ON \
            -DENABLE_HARDENING=ON \
            -DBUILD_TESTS=OFF
          cmake --build . --config Release -j$(sysctl -n hw.ncpu)

      - name: Strip symbols
        run: |
          strip -x build-client/cmake/client/libopaque_client.dylib || true
          strip -x build-server/cmake/server/libopaque_server.dylib || true

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/osx-${{ matrix.arch }}
          cp build-client/cmake/client/libopaque_client.dylib artifacts/osx-${{ matrix.arch }}/
          cp build-server/cmake/server/libopaque_server.dylib artifacts/osx-${{ matrix.arch }}/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-osx-${{ matrix.arch }}
          path: artifacts/osx-${{ matrix.arch }}/
          retention-days: 1

  # ==========================================================================
  # Linux Build (Docker)
  # ==========================================================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Client (Linux x64)
        run: |
          docker build -f Dockerfile.linux \
            --build-arg BUILD_TARGET=client \
            -t opaque-linux-client .
          docker run --rm -v ${{ github.workspace }}/dist:/workspace/dist opaque-linux-client

      - name: Build Server (Linux x64)
        run: |
          docker build -f Dockerfile.linux \
            --build-arg BUILD_TARGET=server \
            -t opaque-linux-server .
          docker run --rm -v ${{ github.workspace }}/dist:/workspace/dist opaque-linux-server

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/linux-x64
          cp dist/client/linux/lib/libopaque_client.so artifacts/linux-x64/ || true
          cp dist/server/linux/lib/libopaque_server.so artifacts/linux-x64/ || true
          # Handle versioned library names
          find dist -name "libopaque_client.so*" -exec cp {} artifacts/linux-x64/libopaque_client.so \; 2>/dev/null || true
          find dist -name "libopaque_server.so*" -exec cp {} artifacts/linux-x64/libopaque_server.so \; 2>/dev/null || true
          ls -la artifacts/linux-x64/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: artifacts/linux-x64/
          retention-days: 1

  # ==========================================================================
  # Windows Build (Docker with MinGW cross-compile)
  # ==========================================================================
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Client (Windows x64)
        run: |
          docker build -f Dockerfile.windows \
            --build-arg BUILD_TARGET=client \
            -t opaque-windows-client .
          docker run --rm -v ${{ github.workspace }}/dist:/workspace/dist opaque-windows-client

      - name: Build Server (Windows x64)
        run: |
          docker build -f Dockerfile.windows \
            --build-arg BUILD_TARGET=server \
            -t opaque-windows-server .
          docker run --rm -v ${{ github.workspace }}/dist:/workspace/dist opaque-windows-server

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/win-x64
          cp dist/client/windows/bin/*.dll artifacts/win-x64/ 2>/dev/null || true
          cp dist/client/windows/lib/*.dll artifacts/win-x64/ 2>/dev/null || true
          cp dist/server/windows/bin/*.dll artifacts/win-x64/ 2>/dev/null || true
          cp dist/server/windows/lib/*.dll artifacts/win-x64/ 2>/dev/null || true
          ls -la artifacts/win-x64/ || echo "No Windows artifacts found"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-win-x64
          path: artifacts/win-x64/
          retention-days: 1

  # ==========================================================================
  # Package and Publish NuGet
  # ==========================================================================
  package-publish:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: native-libs

      - name: Display downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find native-libs -type f -name "*.dll" -o -name "*.so" -o -name "*.dylib" | head -20
          ls -laR native-libs/

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"  # Remove 'v' prefix
          else
            VERSION="1.0.0-ci.${{ github.run_number }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Copy native libs to NuGet structure
        run: |
          # Client package
          mkdir -p nuget/Ecliptix.OPAQUE.Client/runtimes/osx-arm64/native
          mkdir -p nuget/Ecliptix.OPAQUE.Client/runtimes/linux-x64/native
          mkdir -p nuget/Ecliptix.OPAQUE.Client/runtimes/win-x64/native

          cp native-libs/native-osx-arm64/libopaque_client.dylib nuget/Ecliptix.OPAQUE.Client/runtimes/osx-arm64/native/ || true
          cp native-libs/native-linux-x64/libopaque_client.so nuget/Ecliptix.OPAQUE.Client/runtimes/linux-x64/native/ || true
          cp native-libs/native-win-x64/libopaque_client.dll nuget/Ecliptix.OPAQUE.Client/runtimes/win-x64/native/ 2>/dev/null || \
          cp native-libs/native-win-x64/opaque_client.dll nuget/Ecliptix.OPAQUE.Client/runtimes/win-x64/native/libopaque_client.dll 2>/dev/null || true

          # Server package
          mkdir -p nuget/Ecliptix.OPAQUE.Server/runtimes/osx-arm64/native
          mkdir -p nuget/Ecliptix.OPAQUE.Server/runtimes/linux-x64/native
          mkdir -p nuget/Ecliptix.OPAQUE.Server/runtimes/win-x64/native

          cp native-libs/native-osx-arm64/libopaque_server.dylib nuget/Ecliptix.OPAQUE.Server/runtimes/osx-arm64/native/ || true
          cp native-libs/native-linux-x64/libopaque_server.so nuget/Ecliptix.OPAQUE.Server/runtimes/linux-x64/native/ || true
          cp native-libs/native-win-x64/libopaque_server.dll nuget/Ecliptix.OPAQUE.Server/runtimes/win-x64/native/ 2>/dev/null || \
          cp native-libs/native-win-x64/opaque_server.dll nuget/Ecliptix.OPAQUE.Server/runtimes/win-x64/native/libopaque_server.dll 2>/dev/null || true

          echo "=== Client package contents ==="
          find nuget/Ecliptix.OPAQUE.Client/runtimes -type f
          echo "=== Server package contents ==="
          find nuget/Ecliptix.OPAQUE.Server/runtimes -type f

      - name: Build NuGet packages
        run: |
          cd nuget
          dotnet pack Ecliptix.OPAQUE.Client/Ecliptix.OPAQUE.Client.csproj \
            -c Release \
            -o output \
            /p:Version=${{ steps.version.outputs.VERSION }}

          dotnet pack Ecliptix.OPAQUE.Server/Ecliptix.OPAQUE.Server.csproj \
            -c Release \
            -o output \
            /p:Version=${{ steps.version.outputs.VERSION }}

          ls -la output/

      - name: Publish to GitHub Packages
        run: |
          cd nuget/output
          for pkg in *.nupkg; do
            echo "Publishing $pkg..."
            dotnet nuget push "$pkg" \
              --source "https://nuget.pkg.github.com/oleksandrmelnychenko/index.json" \
              --api-key ${{ secrets.GITHUB_TOKEN }} \
              --skip-duplicate
          done

      - name: Upload NuGet packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: nuget/output/*.nupkg
          retention-days: 30
